{% if site.navigation_header %}
<nav class="nav nav--header">
  <!-- Hamburger button for mobile -->
  <button class="button button--nav" id="mobile-menu-button" aria-label="Menu toggle">
    <!-- Inline SVG hamburger -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect y="4" width="24" height="2" fill="currentColor"/>
      <rect y="11" width="24" height="2" fill="currentColor"/>
      <rect y="18" width="24" height="2" fill="currentColor"/>
    </svg>
  </button>

  <!-- Language Toggle -->
  <div class="language-toggle">
    <button onclick="setLang('en')" class="lang-btn">EN</button>
    <span class="sep">|</span>
    <button onclick="setLang('tr')" class="lang-btn">TR</button>
  </div>

  <!-- Navigation List -->
  <ul class="list list--nav" id="mobile-nav-list">
    {% for item in site.navigation_header %}
      {% assign url = item.url contains '://' ? item.url : item.url | relative_url %}
      <li class="item item--nav{% if item.url == page.url %} item--current{% endif %}">
        <a href="{{ url }}">
          <span class="en">{{ item.title }}</span>
          <span class="tr">{{ item.title_tr | default: item.title }}</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>

<script>
  // Language toggle
  function setLang(lang) {
    document.body.className = 'lang-' + lang;
    localStorage.setItem('lang', lang);
  }
  // Restore language on load
  (function() {
    var saved = localStorage.getItem('lang') || 'en';
    document.body.className = 'lang-' + saved;
  })();

  // Mobile menu toggle
  document.addEventListener('DOMContentLoaded', function() {
    const menuBtn = document.getElementById('mobile-menu-button');
    const navList = document.getElementById('mobile-nav-list');
    if (menuBtn && navList) {
      menuBtn.addEventListener('click', function() {
        navList.classList.toggle('active');
      });
    }
  });
</script>
{% endif %}
