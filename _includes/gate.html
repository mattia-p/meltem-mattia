{% if site.gate_protected %}
<div id="password-gate" style="display:none; position:fixed; inset:0; 
    background: rgba(255,255,255,0.55); 
    backdrop-filter: blur(8px); 
    -webkit-backdrop-filter: blur(8px);
    z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:inherit;">
<h2>Meltem & Mattia</h2>
  <p>Please enter the password to continue</p>
  <input id="pw-input" type="password" placeholder="Password" style="padding:8px 12px; font-size:1rem; border:1px solid #ccc; border-radius:4px; margin-bottom:8px;" />
  <button onclick="checkPassword()" style="padding:8px 20px; font-size:1rem; cursor:pointer; background-color:#7a9e7e; color:white; border:none; border-radius:4px;">Enter</button>
  <p id="pw-error" style="color:red; display:none;">Incorrect password, try again.</p>
</div>

<script>
  const CORRECT_PASSWORD = "{{ site.gate_keeper }}";
  const gate = document.getElementById("password-gate");

  if (sessionStorage.getItem("unlocked") === "true") {
    gate.style.display = "none";
  } else {
    gate.style.display = "flex";
  }

  function checkPassword() {
  const input = document.getElementById("pw-input").value;

  const ok =
    input === CORRECT_PASSWORD ||                       
    input.toLowerCase() === CORRECT_PASSWORD.toLowerCase();

  if (ok) {
    sessionStorage.setItem("unlocked", "true");
    gate.style.display = "none";
  } else {
    document.getElementById("pw-error").style.display = "block";
  }
}

  document.getElementById("pw-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkPassword();
  });
</script>
{% endif %}
